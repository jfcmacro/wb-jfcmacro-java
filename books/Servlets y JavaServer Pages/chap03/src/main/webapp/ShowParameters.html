<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 4.0 Transitional//EN">
<HTML>
  <HEAD>
    <TITLE>A Form Example using POST</TITLE>
  </HEAD>
  <BODY BGCOLOR="#FDF5E6">
    <H1 ALIGN="CENTER">A Form example using POST</H1>
    <FORM ACTION="/chap03/ShowParameters" METHOD="POST">
      Number element: <INPUT TYPE="TEXT" NAME="numElem"><BR>
      Quantity: <INPUT TYPE="TEXT" NAME="quantity"><BR>
      Price: <INPUT TYPE="TEXT" NAME="price"><BR>
      <HR>
      Name: <INPUT TYPE="TEXT" NAME="name"><BR>
      Surname: <INPUT TYPE="TEXT" NAME="surname"><BR>
      Middle Name: <INPUT TYPE="TEXT" NAME="midleName"><BR>
      Address to Send: <TEXTAREA NAME="residence" ROWS=3 COLS=40></TEXTAREA><BR>
      Credit Card: <BR>
      &nbsp;&nbsp;<INPUT TYPE="RADIO" NAME="creditCard" VALUE="Visa">Visa<BR>
      &nbsp;&nbsp;<INPUT TYPE="RADIO" NAME="creditCard" VALUE="Mater Card">Master Card<BR>
      &nbsp;&nbsp;<INPUT TYPE="RADIO" NAME="creditCard" VALUE="Amex">American Express<BR>
      &nbsp;&nbsp;<INPUT TYPE="RADIO" NAME="creditCard" VALUE="Discover">Discover<BR>
      &nbsp;&nbsp;<INPUT TYPE="RADIO" NAME="creditCard" VALUE="Java SmartCard">Java SmartCard<BR>
      Credit Card Number: <INPUT TYPE="PASSWORD" NAME="CreditCardNumber"><BR><BR>
      Repit Credit Card Number: <INPUT TYPE="PASSWORD" NAME="CreditCardNumber"><BR><BR>
      <CENTER>
	<INPUT TYPE="SUBMIT" VALUE="Send">
      </CENTER>
    </FORM>
  </BODY>
</HTML>
